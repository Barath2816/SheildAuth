{% extends "base.html" %}

{% block content %}

<div class="password-page">

    <div class="password-container module-float">
        <h2>Password Vulnerability Analysis</h2>

        <form id="passwordForm">

            <div class="password-box">
                <input type="password" id="passwordInput" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn analyze-btn">
                Analyze Password
            </button>

        </form>

        <div id="passwordResults" style="display:none;">

            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>

            <div class="results">

                <p><strong>Strength:</strong> <span id="strengthText"></span></p>

                <p><strong>Length:</strong> <span id="lengthText"></span></p>

                <p><strong>Complexity:</strong> <span id="complexityText"></span></p>

                <p><strong>Dictionary:</strong> <span id="dictionaryText"></span></p>

                <p><strong>Estimated Crack Time:</strong> <span id="crackText"></span></p>

            </div>

        </div>

    </div>
</div>

{% endblock %}
